# @package training

_target_: src.training.trainer.ImageTextTrainer

# Training configuration
epochs: 10
learning_rate: 1e-4
weight_decay: 0.01
warmup_steps: 1000
gradient_clip_norm: 1.0

# Optimizer
optimizer: "AdamW"
adam_betas: [0.9, 0.999]
adam_epsilon: 1e-8

# Scheduler
scheduler: "cosine"
warmup_ratio: 0.1
min_lr_ratio: 0.01

# Loss function
loss_type: "contrastive"  # contrastive, triplet, margin
margin: 0.2
temperature: 0.07
hard_negative_mining: true
hard_negative_ratio: 0.5

# Validation
validate_every_n_epochs: 1
save_every_n_epochs: 2
early_stopping_patience: 5
best_metric: "recall_at_1"

# Checkpointing
save_best: true
save_last: true
keep_last_n_checkpoints: 3

# Mixed precision
use_amp: true
gradient_accumulation_steps: 1

# Logging
log_every_n_steps: 100
log_images_every_n_epochs: 5
max_images_to_log: 8
